<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Virtual Pet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .pet-container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 350px; }
        #pet-emoji { font-size: 80px; margin: 20px 0; transition: transform 0.3s; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { font-size: 14px; font-weight: bold; }
        .bar-container { width: 60px; height: 8px; background: #eee; border-radius: 4px; margin-top: 5px; }
        .bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 15px 5px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .feed-btn { background: #ff7675; color: white; }
        .play-btn { background: #74b9ff; color: white; }
        .sleep-btn { background: #a29bfe; color: white; }
    </style>
</head>
<body>

    <div class="pet-container">
        <h2>မွေးမြူရေးဂိမ်း 🐾</h2>
        
        <div id="pet-emoji">🐱</div>
        
        <div class="stats">
            <div class="stat-box">ဗိုက်ဆာ
                <div class="bar-container"><div id="hunger-bar" class="bar" style="background: #ff7675; width: 100%;"></div></div>
            </div>
            <div class="stat-box">ပျော်ရွှင်
                <div class="bar-container"><div id="happy-bar" class="bar" style="background: #74b9ff; width: 100%;"></div></div>
            </div>
            <div class="stat-box">အိပ်ချင်
                <div class="bar-container"><div id="energy-bar" class="bar" style="background: #a29bfe; width: 100%;"></div></div>
            </div>
        </div>

        <div class="btn-grid">
            <button class="feed-btn" onclick="feed()">အစာကျွေး</button>
            <button class="play-btn" onclick="play()">ကစားမယ်</button>
            <button class="sleep-btn" onclick="sleep()">အိပ်မယ်</button>
        </div>
        <p id="msg" style="margin-top: 15px; color: #636e72;">ကြောင်လေးကို ဂရုစိုက်ပါ!</p>
    </div>

    <script>
        let hunger = 100;
        let happy = 100;
        let energy = 100;

        function updateUI() {
            document.getElementById('hunger-bar').style.width = hunger + '%';
            document.getElementById('happy-bar').style.width = happy + '%';
            document.getElementById('energy-bar').style.width = energy + '%';

            const emoji = document.getElementById('pet-emoji');
            if (hunger < 30 || energy < 30) {
                emoji.innerText = '😿';
                document.getElementById('msg').innerText = "ဗိုက်ဆာနေပြီ ထင်တယ်...";
            } else if (hunger > 80 && happy > 80) {
                emoji.innerText = '😸';
                document.getElementById('msg').innerText = "ကြောင်လေးက အရမ်းပျော်နေတယ်!";
            } else {
                emoji.innerText = '🐱';
            }
        }

        function feed() {
            hunger = Math.min(hunger + 20, 100);
            document.getElementById('pet-emoji').style.transform = 'scale(1.2)';
            setTimeout(() => document.getElementById('pet-emoji').style.transform = 'scale(1)', 300);
            updateUI();
        }

        function play() {
            if (energy > 20) {
                happy = Math.min(happy + 20, 100);
                energy -= 15;
                updateUI();
            } else {
                document.getElementById('msg').innerText = "ကြောင်လေး ပင်ပန်းနေတယ် အိပ်ခိုင်းလိုက်ပါ";
            }
        }

        function sleep() {
            energy = 100;
            hunger -= 10;
            document.getElementById('msg').innerText = "ကြောင်လေး အိပ်ပျော်သွားပြီ... Zzz";
            updateUI();
        }

        // ၁၀ စက္ကန့်တိုင်း ဗိုက်နည်းနည်းစီ ဆာလာမယ်
        setInterval(() => {
            hunger = Math.max(hunger - 5, 0);
            happy = Math.max(happy - 3, 0);
            energy = Math.max(energy - 2, 0);
            updateUI();
        }, 10000);

        updateUI();
    </script>
</body>
</html>
