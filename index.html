<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pet Clicker TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: linear-gradient(180deg, #6c5ce7, #a29bfe); height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; color: white; overflow: hidden; }
        .header { margin-top: 20px; text-align: center; }
        .coin-display { font-size: 32px; font-weight: bold; margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        
        .pet-stage { font-size: 18px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }
        
        #pet-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #pet-avatar { font-size: 120px; cursor: pointer; transition: transform 0.1s; user-select: none; }
        #pet-avatar:active { transform: scale(0.8); }

        .footer { width: 100%; background: white; border-radius: 30px 30px 0 0; padding: 20px; box-sizing: border-box; color: #333; text-align: center; }
        .progress-container { width: 100%; height: 15px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #00b894; transition: width 0.3s; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: white; }
        .upgrade-btn { background: #fdcb6e; color: #333; }
        .share-btn { background: #0984e3; }
    </style>
</head>
<body>

    <div class="header">
        <div class="coin-display">💰 <span id="coins">0</span></div>
        <div class="pet-stage" id="stage">Stage: ဥလေး (Egg)</div>
    </div>

    <div id="pet-area">
        <div id="pet-avatar" onclick="handleTap()">🥚</div>
    </div>

    <div class="footer">
        <div style="display: flex; justify-content: space-between; font-size: 14px;">
            <span>Level Up Progress</span>
            <span id="percent">0%</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="btn-group">
            <button class="btn upgrade-btn" onclick="upgrade()">Upgrade (Cost: 50)</button>
            <button class="btn share-btn" onclick="share()">Invite Friends</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 0;
        let exp = 0;
        let level = 1;
        const stages = ["🥚", "🐣", "🐥", "🐔", "🦖", "🐉"];

        function handleTap() {
            coins += 1;
            exp += 2;
            if (exp >= 100) exp = 100;
            updateUI();
            
            // Haptic Feedback (ဖုန်းတုန်ခါမှု) - Telegram မှာပဲ ရတယ်
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function upgrade() {
            if (coins >= 50 && level < stages.length) {
                coins -= 50;
                level++;
                exp = 0;
                updateUI();
                alert("Level Up! ပိုကြီးလာပြီ!");
            } else if (level >= stages.length) {
                alert("အမြင့်ဆုံးအဆင့် ရောက်သွားပြီ!");
            } else {
                alert("ပိုက်ဆံမလောက်သေးဘူး!");
            }
        }

        function share() {
            // Telegram Share Link
            const url = "https://t.me/share/url?url=https://t.me/မင်းရဲ့botနာမည်&text=ငါ့ရဲ့နဂါးလေးကိုလာကြည့်လှည့်!";
            tg.openTelegramLink(url);
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins;
            document.getElementById('progress-bar').style.width = exp + '%';
            document.getElementById('percent').innerText = exp + '%';
            document.getElementById('pet-avatar').innerText = stages[level - 1];
            
            const stageNames = ["ဥ", "ပေါက်စ", "ကြက်ပေါက်", "ကြက်မကြီး", "ဒိုင်နိုဆော", "နဂါး"];
            document.getElementById('stage').innerText = "Stage: " + stageNames[level - 1];
        }
    </script>
</body>
</html>
