<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Checkers</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; touch-action: manipulation; }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            border: 5px solid #1a252f;
        }
        .square { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .black { background-color: #34495e; }
        .white { background-color: #ecf0f1; }
        .piece { width: 80%; height: 80%; border-radius: 50%; transition: 0.2s; position: relative; }
        .player-piece { background: #e74c3c; box-shadow: 0 4px #c0392b; border: 2px solid #fff; }
        .bot-piece { background: #2ecc71; box-shadow: 0 4px #27ae60; border: 2px solid #fff; }
        .selected { border: 4px solid #f1c40f !important; transform: scale(1.1); }
        #status { margin: 15px 0; font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 20px; }
        button { padding: 10px 20px; background: #e67e22; border: none; color: white; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">မင်းအလှည့် (အနီ)</div>
    <div id="board" class="board"></div>
    <br>
    <button onclick="resetGame()">ဂိမ်းပြန်စမည်</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        let boardState = Array(8).fill().map(() => Array(8).fill(''));
        let selected = null;

        function resetGame() {
            boardState = Array(8).fill().map(() => Array(8).fill(''));
            // အပေါ် ၃ တန်းမှာ စက်ရုပ်တွေ ချမယ်
            for(let r=0; r<3; r++) for(let c=0; c<8; c++) if((r+c)%2!==0) boardState[r][c] = 'bot';
            // အောက် ၃ တန်းမှာ လူရုပ်တွေ ချမယ်
            for(let r=5; r<8; r++) for(let c=0; c<8; c++) if((r+c)%2!==0) boardState[r][c] = 'player';
            selected = null;
            createBoard();
            statusElement.innerText = "မင်းအလှည့် (အနီ)";
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    square.onclick = () => handleSquareClick(r, c);
                    
                    if (boardState[r][c]) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${boardState[r][c]}-piece`;
                        if (selected && selected.r === r && selected.c === c) piece.classList.add('selected');
                        square.appendChild(piece);
                    }
                    boardElement.appendChild(square);
                }
            }
        }

        function handleSquareClick(r, c) {
            if (boardState[r][c] === 'player') {
                selected = { r, c };
                createBoard();
            } else if (selected && boardState[r][c] === '' && (r+c)%2!==0) {
                const rowDiff = r - selected.r;
                const colDiff = Math.abs(c - selected.c);

                if (rowDiff === -1 && colDiff === 1) { // ရိုးရိုးရွှေ့
                    makeMove(selected.r, selected.c, r, c);
                } else if (rowDiff === -2 && colDiff === 2) { // ခုန်စား
                    const midR = (selected.r + r) / 2, midC = (selected.c + c) / 2;
                    if (boardState[midR][midC] === 'bot') {
                        boardState[midR][midC] = '';
                        makeMove(selected.r, selected.c, r, c);
                    }
                }
            }
        }

        function makeMove(fr, fc, tr, tc) {
            boardState[tr][tc] = boardState[fr][fc];
            boardState[fr][fc] = '';
            selected = null;
            createBoard();
            statusElement.innerText = "စက်အလှည့်...";
            setTimeout(botAI, 600);
        }

        function botAI() {
            let moved = false;
            // စက် Logic: စားလို့ရတာရှိရင် အရင်စားမယ်
            for(let r=0; r<8 && !moved; r++) {
                for(let c=0; c<8 && !moved; c++) {
                    if(boardState[r][c] === 'bot') {
                        for(let dr of [2]) for(let dc of [-2, 2]) {
                            let nr = r+dr, nc = c+dc, mr = r+dr/2, mc = c+dc/2;
                            if(nr<8 && nc>=0 && nc<8 && boardState[nr][nc]==='' && boardState[mr][mc]==='player') {
                                boardState[r][c]=''; boardState[mr][mc]=''; boardState[nr][nc]='bot';
                                moved = true;
                            }
                        }
                    }
                }
            }
            // စားစရာမရှိရင် ရိုးရိုးရွှေ့မယ်
            if(!moved) {
                for(let r=0; r<7 && !moved; r++) {
                    for(let c=0; c<8 && !moved; c++) {
                        if(boardState[r][c] === 'bot') {
                            for(let dc of [-1, 1]) {
                                let nc = c+dc;
                                if(nc>=0 && nc<8 && boardState[r+1][nc]==='') {
                                    boardState[r][c]=''; boardState[r+1][nc]='bot';
                                    moved = true;
                                }
                            }
                        }
                    }
                }
            }
            createBoard();
            statusElement.innerText = "မင်းအလှည့် (အနီ)";
        }

        resetGame();
    </script>
</body>
</html>
